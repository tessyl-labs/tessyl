name: Tessyl Native

on:
  pull_request:
    paths:
      - "packages/tessyl-native/**"
      - "apps/web/**"
      - ".github/workflows/tessyl-native.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: voyd-lang/voyd
          ref: 7bb7eb921550e6321a470a663f6c3ebd919a614b
          path: .voyd-source
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci && npx turbo run build
        working-directory: .voyd-source
      - run: sudo mkdir -p /Users/drewy/code && sudo ln -s "$GITHUB_WORKSPACE/.voyd-source" /Users/drewy/code/voyd
      - run: npm ci
      - run: npm run typecheck --workspace=@tessyl/native
      - run: npm test --workspace=@tessyl/native

  browsers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: voyd-lang/voyd
          ref: 7bb7eb921550e6321a470a663f6c3ebd919a614b
          path: .voyd-source
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci && npx turbo run build
        working-directory: .voyd-source
      - run: sudo mkdir -p /Users/drewy/code && sudo ln -s "$GITHUB_WORKSPACE/.voyd-source" /Users/drewy/code/voyd
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:browser --workspace=@tessyl/native
