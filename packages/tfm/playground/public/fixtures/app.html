<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{display:grid;min-height:100vh;margin:0;place-items:center;background:#ecfdf5;color:#064e3b;font:16px system-ui}.card{padding:2rem;border:1px solid #a7f3d0;border-radius:1rem;background:white;box-shadow:0 10px 30px #064e3b1a;text-align:center}button{padding:.65rem 1rem;border:0;border-radius:.7rem;background:#047857;color:white;font:inherit;font-weight:700}</style></head><body><main class="card"><h1>Sandboxed Tessera fixture</h1><p>This local app verifies the resolved iframe path.</p><button id="counter" type="button">Interactions: 0</button></main><script>let count=0;document.querySelector('#counter').addEventListener('click',event=>{event.currentTarget.textContent=`Interactions: ${++count}`})</script></body></html>
